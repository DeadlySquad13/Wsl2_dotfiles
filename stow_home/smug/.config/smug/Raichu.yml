session: Raichu

root: ~/Projects/--professional/Rutube__/Raichu

windows:
  - name: sessions
    manual: false
    layout: main-vertical
    commands:
      - ./_scripts/smug-worktrees.sh

  - name: server&git
    manual: false
    layout: main-vertical
    commands:
      # TODO: Move to a parallel process (one more temp. pane?)
      - brew services restart nginx
      - ./_scripts/choose-script.sh
    panes:
      - type: horizontal
        commands:
          - cd Raichu.git
          - lazygit

  - name: kbn
    layout: main-vertical
    commands:
      - cd ~/.bookmarks/"kbn/rut Rutube_system/p projects-/r --professional @p/Raichu__"
      - ranger

  - name: demo
    commands:
      - cd ~/Documents/_demo
