session: Dotfiles

root: ~/.bookmarks/

windows:
  - name: Unix_dotfiles
    root: ~/.bookmarks/Unix_dotfiles

  - name: Programming_dotfiles
    root: ~/.bookmarks/Programming_dotfiles.bootstrap

  - name: NeoVim_config (dev)
    root: ~/.bookmarks/shared-configs/NeoVim_config

  - name: Wsl2_dotfiles (stage / dev)
    root: ~/.bookmarks/shared-configs/Unix_dotfiles/modules/home/apps/cli-utility/Wsl2_dotfiles

  - name: dotfiles
    commands:
      - br --only-folders --cmd "configs|scripts"

  - name: kbd
    commands:
      - cd kbd
      - ranger

